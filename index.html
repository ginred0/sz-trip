<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深港一日行程</title>
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --gold: #B8956A;
    --gold-light: #E8D5B7;
    --ink: #1A1A1A;
    --ink-mid: #555;
    --ink-light: #999;
    --border: #E0D8CE;
    --red: #C0392B;
    --green: #2E7D52;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: #fff;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .header-title {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header-date {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
  }

  .depart-control {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .depart-label {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .time-picker {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 4px 10px;
    text-align: center;
    width: 88px;
    cursor: pointer;
  }

  .time-picker:focus { outline: none; border-color: var(--gold); }

  main { padding: 16px; max-width: 520px; margin: 0 auto; }

  /* Timeline */
  .timeline { position: relative; }

  .tl-item {
    display: flex;
    gap: 14px;
    margin-bottom: 8px;
  }

  .tl-spine {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 36px;
  }

  .tl-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg);
    flex-shrink: 0;
    margin-top: 4px;
    z-index: 1;
  }

  .tl-dot.small { width: 8px; height: 8px; background: var(--border); margin-top: 6px; }

  .tl-line {
    width: 1px;
    flex: 1;
    background: var(--border);
    min-height: 16px;
    margin-top: 2px;
  }

  .tl-time {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
    margin-top: 3px;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .tl-card {
    flex: 1;
    background: var(--card);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 0;
    border: 1px solid var(--border);
  }

  .tl-card.highlighted {
    border-color: var(--gold);
    background: #FFFDF9;
  }

  .tl-card-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
    font-weight: 600;
  }

  .tl-card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--ink);
  }

  .tl-card-sub {
    font-size: 12px;
    color: var(--ink-mid);
    margin-top: 4px;
    line-height: 1.5;
  }

  .tl-card-duration {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .duration-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--ink-mid);
  }

  /* Choice selector */
  .choice-group {
    margin-top: 10px;
  }

  .choice-label {
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .choice-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .choice-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: #fff;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }

  .choice-btn.selected {
    border-color: var(--gold);
    background: #FFFBF4;
  }

  .choice-btn .radio {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .choice-btn.selected .radio {
    border-color: var(--gold);
    background: var(--gold);
  }

  .choice-btn.selected .radio::after {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
  }

  .choice-main {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .choice-meta {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 1px;
  }

  .choice-transit {
    font-size: 11px;
    color: var(--ink-mid);
    text-align: right;
    white-space: nowrap;
  }

  /* Museum section */
  .museum-card {
    background: var(--ink);
    color: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 0;
  }

  .museum-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .museum-en {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    margin-top: 2px;
  }

  .museum-exhibits {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 10px;
  }

  .exhibit-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    gap: 8px;
  }

  .exhibit-row:last-child { border-bottom: none; }

  .exhibit-name { color: rgba(255,255,255,0.9); flex: 1; }
  .exhibit-type { font-size: 10px; color: var(--gold); flex-shrink: 0; }
  .exhibit-dates { font-size: 10px; color: rgba(255,255,255,0.4); flex-shrink: 0; text-align: right; }

  .ticket-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(184,149,106,0.15);
    border-radius: 6px;
    font-size: 11px;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Dinner section */
  .section-header {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Border crossing */
  .crossing-card {
    background: #EEF7F2;
    border: 1px solid #A8D5BB;
    border-radius: 10px;
    padding: 12px 14px;
  }

  .crossing-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 4px;
  }

  .crossing-sub { font-size: 12px; color: #3a6b52; }

  /* Summary bar */
  .summary-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    z-index: 100;
  }

  .summary-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .summary-value { font-size: 16px; font-weight: 700; color: var(--gold); }
  .summary-key { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-transform: uppercase; }

  .pb-safe { height: 64px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">深港一日游</div>
      <div class="header-date">深圳国际美术馆</div>
      <div class="header-sub">SIMoA · 光明区 · 全天通票 ¥94</div>
    </div>
    <div class="depart-control">
      <div class="depart-label">港方出发</div>
      <input type="time" class="time-picker" id="hkDepartTime" value="10:00" oninput="recalculate()">
    </div>
  </div>
</header>

<main>
  <div class="timeline" id="timeline"></div>
  <div class="pb-safe"></div>
</main>

<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-value" id="sumLunch">—</div>
    <div class="summary-key">午饭到达</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumMuseum">—</div>
    <div class="summary-key">美术馆入场</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumDinner">—</div>
    <div class="summary-key">晚饭开始</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumReturn">—</div>
    <div class="summary-key">过关抵达</div>
  </div>
</div>

<script>
const LUNCH_OPTIONS = [
  {
    id: 'xinqidian',
    name: '新起点脆肉鲩火锅',
    sub: '福田首店 · 火锅',
    transit_metro: '地铁34分钟（4号线5站）',
    transit_taxi: '打车20分钟',
    transit_min: 20,
    museum_taxi: 40,
    arrival_offset: 40
  },
  {
    id: 'fanlou',
    name: '繁楼',
    sub: '华强北店 · 粤菜',
    transit_metro: '地铁30分钟（4号线-2号线5站）',
    transit_taxi: '打车20分钟',
    transit_min: 20,
    museum_taxi: 50,
    arrival_offset: 50
  },
  {
    id: 'banu',
    name: '巴奴毛肚火锅',
    sub: '卓越中心店 · 火锅',
    transit_metro: '地铁20分钟（10号线2站）',
    transit_taxi: '打车12分钟',
    transit_min: 12,
    museum_taxi: 50,
    arrival_offset: 50
  },
  {
    id: 'wenji',
    name: '文记虾一跳',
    sub: '深圳北站店 · 虾料理',
    transit_metro: '地铁30分钟（4号线8站）',
    transit_taxi: '打车24分钟',
    transit_min: 24,
    museum_taxi: 40,
    arrival_offset: 40
  }
];

const DINNER_OPTIONS = [
  { id: 'zhds', name: '光明招待所', sub: '乳鸽 · 光明特色' },
  { id: 'liubing', name: '刘冰乳鸽店', sub: '乳鸽 · 老字号' },
  { id: 'nanyue', name: '老字号南粤光明乳鸽', sub: '乳鸽 · 光明总店' },
  { id: 'minghu', name: '明湖楼·顺德菜', sub: '顺德菜 · 光明店' }
];

const BORDER_OPTIONS = [
  { id: 'futian', name: '福田口岸', sub: '打车约60分钟' },
  { id: 'luohu', name: '罗湖口岸', sub: '打车约60分钟' }
];

let state = {
  hkDepart: '10:00',
  lunch: 'banu',
  dinner: 'zhds',
  border: 'futian'
};

function parseTime(str) {
  const [h, m] = str.split(':').map(Number);
  return h * 60 + m;
}

function formatTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function recalculate() {
  state.hkDepart = document.getElementById('hkDepartTime').value;
  render();
}

function selectLunch(id) { state.lunch = id; render(); }
function selectDinner(id) { state.dinner = id; render(); }
function selectBorder(id) { state.border = id; render(); }

function render() {
  const lunchOpt = LUNCH_OPTIONS.find(o => o.id === state.lunch);
  const dinnerOpt = DINNER_OPTIONS.find(o => o.id === state.dinner);
  const borderOpt = BORDER_OPTIONS.find(o => o.id === state.border);

  const hkDepart = parseTime(state.hkDepart);
  const bordercross = hkDepart + 70; // ~70 min to cross and arrive
  const lunchArrive = bordercross + lunchOpt.transit_min;
  const lunchStart = lunchArrive;
  const lunchEnd = lunchStart + 110; // 1h50min
  const museumDepart = lunchEnd;
  const museumArrive = museumDepart + lunchOpt.arrival_offset;
  const museumEnd = museumArrive + 270; // ~4.5h viewing (closes 18:00, last entry 17:00)
  const dinnerStart = museumEnd;
  const dinnerEnd = dinnerStart + 90;
  const returnDepart = dinnerEnd;
  const returnArrive = returnDepart + 60;

  // Update summary bar
  document.getElementById('sumLunch').textContent = formatTime(lunchStart);
  document.getElementById('sumMuseum').textContent = formatTime(museumArrive);
  document.getElementById('sumDinner').textContent = formatTime(dinnerStart);
  document.getElementById('sumReturn').textContent = formatTime(returnArrive);

  const tl = document.getElementById('timeline');

  tl.innerHTML = `
    <!-- HK Depart -->
    ${tlItem(formatTime(hkDepart), '港方集合', '九龙塘地铁站', '集合出发前往福田口岸', 'normal', false)}
    ${tlItem(formatTime(bordercross), '深圳入境', '福田口岸', '过关后出发前往午饭地点', 'normal', false)}

    <!-- Lunch -->
    ${tlItemOpen(formatTime(lunchStart), '午饭', '选择餐厅', 'highlighted')}
      <div class="choice-group">
        <div class="choice-label">选择餐厅</div>
        <div class="choice-options">
          ${LUNCH_OPTIONS.map(o => `
            <button class="choice-btn ${o.id === state.lunch ? 'selected' : ''}" onclick="selectLunch('${o.id}')">
              <div class="radio"></div>
              <div style="flex:1">
                <div class="choice-main">${o.name}</div>
                <div class="choice-meta">${o.sub}</div>
                <div class="choice-meta">${o.transit_metro} · ${o.transit_taxi}</div>
              </div>
              <div class="choice-transit">→美术馆<br>打车${o.museum_taxi}分</div>
            </button>
          `).join('')}
        </div>
      </div>
    ${tlItemClose(formatTime(lunchEnd), '约110分钟')}

    <!-- Museum -->
    ${tlItemOpenMuseum(formatTime(museumArrive), museumArrive, museumEnd)}
    ${tlItemCloseMuseum(formatTime(museumEnd))}

    <!-- Dinner -->
    ${tlItemOpen(formatTime(dinnerStart), '晚饭', '光明特色乳鸽', 'highlighted')}
      <div class="choice-group">
        <div class="choice-label">选择餐厅（距美术馆约7分钟车程）</div>
        <div class="choice-options">
          ${DINNER_OPTIONS.map(o => `
            <button class="choice-btn ${o.id === state.dinner ? 'selected' : ''}" onclick="selectDinner('${o.id}')">
              <div class="radio"></div>
              <div>
                <div class="choice-main">${o.name}</div>
                <div class="choice-meta">${o.sub}</div>
              </div>
            </button>
          `).join('')}
        </div>
      </div>
    ${tlItemClose(formatTime(dinnerEnd), '约90分钟')}

    <!-- Border Return -->
    ${tlItemOpen(formatTime(returnDepart), '返回过关', '选择口岸', 'normal')}
      <div class="choice-group">
        <div class="choice-options">
          ${BORDER_OPTIONS.map(o => `
            <button class="choice-btn ${o.id === state.border ? 'selected' : ''}" onclick="selectBorder('${o.id}')">
              <div class="radio"></div>
              <div>
                <div class="choice-main">${o.name}</div>
                <div class="choice-meta">${o.sub}</div>
              </div>
            </button>
          `).join('')}
        </div>
      </div>
    ${tlItemCloseReturn(formatTime(returnArrive), borderOpt.name)}
  `;
}

function tlItem(time, label, title, sub, type, last) {
  return `
    <div class="tl-item">
      <div class="tl-time">${time}</div>
      <div class="tl-spine">
        <div class="tl-dot"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-card">
        <div class="tl-card-label">${label}</div>
        <div class="tl-card-title">${title}</div>
        <div class="tl-card-sub">${sub}</div>
      </div>
    </div>
  `;
}

function tlItemOpen(time, label, title, cardClass) {
  return `
    <div class="tl-item">
      <div class="tl-time">${time}</div>
      <div class="tl-spine">
        <div class="tl-dot"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-card ${cardClass}">
        <div class="tl-card-label">${label}</div>
        <div class="tl-card-title">${title}</div>
  `;
}

function tlItemClose(endTime, duration) {
  return `
        <div class="tl-card-duration"><span class="duration-pill">${duration}</span> 结束约 ${endTime}</div>
      </div>
    </div>
  `;
}

function tlItemOpenMuseum(arriveTime, arriveMin, endMin) {
  const closeWarning = endMin > 17 * 60 ? '<span style="color:#C0392B;font-size:10px;margin-left:6px;">⚠ 注意17:00停止入场</span>' : '';
  return `
    <div class="tl-item">
      <div class="tl-time">${arriveTime}</div>
      <div class="tl-spine">
        <div class="tl-dot"></div>
        <div class="tl-line"></div>
      </div>
      <div class="museum-card">
        <div class="museum-en">SIMoA · 光明大道16号</div>
        <div class="museum-name">深圳国际美术馆${closeWarning}</div>
        <div class="ticket-note">🎟 全天通票（咸鱼 ¥94）· 含以下全部展览</div>
        <div class="museum-exhibits">
          <div class="exhibit-row">
            <div class="exhibit-name">新链：艺术的未来</div>
            <div class="exhibit-type">特展</div>
            <div class="exhibit-dates">至 2027.4.30</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">徐冰：字在乐园</div>
            <div class="exhibit-type">特展</div>
            <div class="exhibit-dates">至 2027.4.30</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">国宝归来</div>
            <div class="exhibit-type">特展</div>
            <div class="exhibit-dates">至 2026.7.20</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">闪烁的1/∞</div>
            <div class="exhibit-type">普展</div>
            <div class="exhibit-dates">至 2027.4.30</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">缣素绵延</div>
            <div class="exhibit-type">普展</div>
            <div class="exhibit-dates">至 2026.7.29</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">东方根脉与当代转化</div>
            <div class="exhibit-type">普展</div>
            <div class="exhibit-dates">至 2026.11.20</div>
          </div>
          <div class="exhibit-row">
            <div class="exhibit-name">大师之境</div>
            <div class="exhibit-type">普展</div>
            <div class="exhibit-dates">至 2026.8.31</div>
          </div>
        </div>
  `;
}

function tlItemCloseMuseum(endTime) {
  return `
        <div style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.35);">开放时间 10:00–18:00 · 17:00停止入场 · 周一闭馆</div>
      </div>
    </div>
  `;
}

function tlItemCloseReturn(arriveTime, borderName) {
  return `
        <div class="tl-card-duration"><span class="duration-pill">约60分钟</span> 抵达 ${arriveTime}</div>
      </div>
    </div>
    <div class="tl-item">
      <div class="tl-time">${arriveTime}</div>
      <div class="tl-spine">
        <div class="tl-dot" style="background:#2E7D52"></div>
      </div>
      <div class="crossing-card">
        <div class="crossing-title">✓ 抵达 ${borderName}</div>
        <div class="crossing-sub">行程结束，安全回港</div>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
