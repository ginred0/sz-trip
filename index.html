<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深港一日行程</title>
<style>
  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --gold: #B8956A;
    --gold-light: #E8D5B7;
    --ink: #1A1A1A;
    --ink-mid: #555;
    --ink-light: #999;
    --border: #E0D8CE;
    --red: #C0392B;
    --green: #2E7D52;
    --blue: #34597D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: #fff;
    padding: 18px 18px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .header-title {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header-date { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }

  .depart-control { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .depart-label { font-size: 10px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }

  .time-picker {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 4px 10px;
    text-align: center;
    width: 88px;
    cursor: pointer;
  }
  .time-picker:focus { outline: none; border-color: var(--gold); }

  main { padding: 16px; max-width: 520px; margin: 0 auto; }

  .timeline { position: relative; }
  .tl-item { display: flex; gap: 14px; margin-bottom: 8px; }
  .tl-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 12px; }

  .tl-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--gold); border: 2px solid var(--bg);
    flex-shrink: 0; margin-top: 4px; z-index: 1;
  }
  .tl-line { width: 1px; flex: 1; background: var(--border); min-height: 16px; margin-top: 2px; }

  .tl-time {
    font-size: 13px; font-variant-numeric: tabular-nums;
    color: var(--gold); font-weight: 700; line-height: 1;
    margin-top: 3px; width: 38px; text-align: right; flex-shrink: 0;
  }

  .tl-card { flex: 1; background: var(--card); border-radius: 10px; padding: 12px 14px; border: 1px solid var(--border); }
  .tl-card.highlighted { border-color: var(--gold); background: #FFFDF9; }

  .tl-card-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; font-weight: 600; }
  .tl-card-title { font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--ink); }
  .tl-card-sub { font-size: 12px; color: var(--ink-mid); margin-top: 4px; line-height: 1.5; }
  .tl-card-duration { font-size: 11px; color: var(--ink-light); margin-top: 8px; display: flex; align-items: center; gap: 6px; }

  .duration-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--ink-mid); }

  .choice-group { margin-top: 10px; }
  .choice-label { font-size: 10px; color: var(--ink-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .choice-options { display: flex; flex-direction: column; gap: 6px; }

  .choice-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 7px;
    border: 1.5px solid var(--border); background: #fff;
    cursor: pointer; text-align: left;
    transition: border-color 0.15s, background 0.15s; width: 100%;
  }
  .choice-btn.selected { border-color: var(--gold); background: #FFFBF4; }

  .choice-btn .radio {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .choice-btn.selected .radio { border-color: var(--gold); background: var(--gold); }
  .choice-btn.selected .radio::after { content: ''; width: 4px; height: 4px; border-radius: 50%; background: #fff; }

  .choice-main { flex: 1; font-size: 13px; font-weight: 500; color: var(--ink); }
  .choice-meta { font-size: 11px; color: var(--ink-light); margin-top: 1px; }
  .choice-transit { font-size: 11px; color: var(--ink-mid); text-align: right; white-space: nowrap; }

  /* Museum */
  .museum-card { background: var(--ink); color: #fff; border-radius: 10px; padding: 14px 16px; }
  .museum-name { font-size: 16px; font-weight: 700; letter-spacing: 0.03em; }
  .museum-en { font-size: 11px; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 2px; }
  .museum-exhibits { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .exhibit-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 8px; }
  .exhibit-row:last-child { border-bottom: none; }
  .exhibit-name { color: rgba(255,255,255,0.9); flex: 1; }
  .exhibit-type { font-size: 10px; color: var(--gold); flex-shrink: 0; }
  .exhibit-dates { font-size: 10px; color: rgba(255,255,255,0.4); flex-shrink: 0; text-align: right; }
  .ticket-note { margin-top: 10px; padding: 8px 10px; background: rgba(184,149,106,0.15); border-radius: 6px; font-size: 11px; color: var(--gold-light); display: flex; align-items: center; gap: 6px; }

  /* Viewing duration slider */
  .view-control { margin-top: 12px; padding: 10px 12px; background: rgba(255,255,255,0.06); border-radius: 8px; }
  .view-control-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .view-control-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.06em; }
  .view-control-value { font-size: 14px; font-weight: 700; color: var(--gold); }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid var(--ink); }
  input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid var(--ink); }
  .view-end-note { font-size: 11px; margin-top: 8px; }

  /* Plan branch banner */
  .plan-banner {
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .plan-banner.guangming { background: #FFFBF4; border-color: var(--gold); }
  .plan-banner.nantou { background: #EEF3F8; border-color: #A8C2DB; }
  .plan-banner-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 4px; }

  .plan-toggle { display: flex; gap: 8px; margin-bottom: 8px; }
  .plan-toggle-btn {
    flex: 1; padding: 10px; border-radius: 8px; cursor: pointer;
    border: 1.5px solid var(--border); background: #fff;
    text-align: center; transition: all 0.15s;
  }
  .plan-toggle-btn.active { border-color: var(--gold); background: var(--ink); color: #fff; }
  .plan-toggle-title { font-size: 13px; font-weight: 700; }
  .plan-toggle-sub { font-size: 10px; color: var(--ink-light); margin-top: 2px; }
  .plan-toggle-btn.active .plan-toggle-sub { color: rgba(255,255,255,0.6); }

  .auto-hint { font-size: 11px; color: var(--ink-mid); padding: 6px 0; line-height: 1.5; }
  .auto-hint b { color: var(--ink); }

  /* Nantou extras */
  .extras { margin-top: 10px; }
  .extras-section { margin-bottom: 10px; }
  .extras-title { font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 5px; letter-spacing: 0.04em; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: #fff; border: 1px solid var(--border); color: var(--ink-mid); }
  .tag.snack { border-color: #E8D5B7; background: #FFFBF4; }
  .tag.shop { border-color: #C4D4E2; background: #F4F8FB; }

  .section-header { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 10px; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .crossing-card { background: #EEF7F2; border: 1px solid #A8D5BB; border-radius: 10px; padding: 12px 14px; }
  .crossing-title { font-size: 14px; font-weight: 600; color: var(--green); margin-bottom: 4px; }
  .crossing-sub { font-size: 12px; color: #3a6b52; }

  .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: #fff; padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; z-index: 100; }
  .summary-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .summary-value { font-size: 15px; font-weight: 700; color: var(--gold); }
  .summary-key { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; text-transform: uppercase; }

  .pb-safe { height: 60px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">深港一日游</div>
      <div class="header-date">深圳国际美术馆</div>
      <div class="header-sub">SIMoA · 光明区 · 全天通票 ¥94</div>
    </div>
    <div class="depart-control">
      <div class="depart-label">港方出发</div>
      <input type="time" class="time-picker" id="hkDepartTime" value="10:00" oninput="recalculate()">
    </div>
  </div>
</header>

<main>
  <div class="timeline" id="timeline"></div>
  <div class="pb-safe"></div>
</main>

<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-value" id="sumLunch">—</div>
    <div class="summary-key">午饭</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumMuseum">—</div>
    <div class="summary-key">入场</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumViewEnd">—</div>
    <div class="summary-key">看展结束</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumDinner">—</div>
    <div class="summary-key">晚饭</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" id="sumReturn">—</div>
    <div class="summary-key">过关</div>
  </div>
</div>

<script>
const LUNCH_OPTIONS = [
  { id: 'xinqidian', name: '新起点脆肉鲩火锅', sub: '福田首店 · 火锅', transit_metro: '地铁34分钟（4号线5站）', transit_taxi: '打车20分钟', transit_min: 20, museum_taxi: 40 },
  { id: 'fanlou', name: '繁楼', sub: '华强北店 · 粤菜', transit_metro: '地铁30分钟（4号线-2号线5站）', transit_taxi: '打车20分钟', transit_min: 20, museum_taxi: 50 },
  { id: 'banu', name: '巴奴毛肚火锅', sub: '卓越中心店 · 火锅', transit_metro: '地铁20分钟（10号线2站）', transit_taxi: '打车12分钟', transit_min: 12, museum_taxi: 50 },
  { id: 'wenji', name: '文记虾一跳', sub: '深圳北站店 · 虾料理', transit_metro: '地铁30分钟（4号线8站）', transit_taxi: '打车24分钟', transit_min: 24, museum_taxi: 40 }
];

// 方案 A：光明乳鸽（看展较晚结束时推荐）
const GUANGMING_DINNER = [
  { id: 'zhds', name: '光明招待所', sub: '乳鸽 · 光明特色' },
  { id: 'liubing', name: '刘冰乳鸽店', sub: '乳鸽 · 老字号' },
  { id: 'nanyue', name: '老字号南粤光明乳鸽', sub: '乳鸽 · 光明总店' },
  { id: 'minghu', name: '明湖楼·顺德菜', sub: '顺德菜 · 光明店' }
];

// 方案 B：南头古城（看展早于17:00结束时推荐）
const NANTOU_DINNER = [
  { id: 'banxian', name: '半仙贵州小馆', sub: '贵州菜' },
  { id: 'yunnan', name: '云喃乡野厨房', sub: '云南菜' },
  { id: 'ldc', name: 'LDC 梁杜陈潮汕食堂', sub: '潮汕菜 · 罗氏虾、炒吊龙' },
  { id: 'sipup', name: 'SipUp 西皮葡萄酒餐酒馆', sub: '酒馆 · 西餐' }
];

const NANTOU_SNACKS = ['彬妈糖水', '超级香蕉烧', '兔子夫妇栗酥饼'];
const NANTOU_SHOPS = ['9GAAI 杂货铺', 'nitty gritty 小细节商店', '宫冶和集', 'Roseanna vintage', '小行星森林女巫店', '九街杂货铺（银饰·文创·手帐）', 'PROEM（香薰）', '跳海酒馆'];

const BORDER_OPTIONS = [
  { id: 'futian', name: '福田口岸' },
  { id: 'luohu', name: '罗湖口岸' }
];

// 返回口岸车程（分钟）：根据晚间方案不同
const RETURN_MIN = {
  guangming: { futian: 60, luohu: 60 },
  nantou: { futian: 30, luohu: 40 }
};

let state = {
  hkDepart: '10:00',
  lunch: 'banu',
  viewMinutes: 240,      // 默认看展 4 小时
  eveningPlan: 'auto',   // auto / guangming / nantou
  dinnerGuangming: 'zhds',
  dinnerNantou: 'banxian',
  border: 'futian'
};

function parseTime(str) { const [h, m] = str.split(':').map(Number); return h * 60 + m; }
function formatTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = ((mins % 60) + 60) % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function recalculate() { state.hkDepart = document.getElementById('hkDepartTime').value; render(); }
function selectLunch(id) { state.lunch = id; render(); }
function setViewMinutes(v) { state.viewMinutes = parseInt(v); render(); }
function selectPlan(p) { state.eveningPlan = p; render(); }
function selectDinnerGM(id) { state.dinnerGuangming = id; render(); }
function selectDinnerNT(id) { state.dinnerNantou = id; render(); }
function selectBorder(id) { state.border = id; render(); }

const MUSEUM_CLOSE = 18 * 60;     // 18:00 闭馆
const LAST_ENTRY = 17 * 60;       // 17:00 停止入场
const NANTOU_CUTOFF = 17 * 60;    // 早于17:00结束才适合去南头古城
const NANTOU_TAXI = 50;           // 美术馆→南头古城 打车50分钟

function render() {
  const lunchOpt = LUNCH_OPTIONS.find(o => o.id === state.lunch);
  const borderOpt = BORDER_OPTIONS.find(o => o.id === state.border);

  const hkDepart = parseTime(state.hkDepart);
  const bordercross = hkDepart + 70;
  const lunchStart = bordercross + lunchOpt.transit_min;
  const lunchEnd = lunchStart + 110;
  const museumArrive = lunchEnd + lunchOpt.museum_taxi;
  // 看展结束时间，但不晚于闭馆
  let viewEnd = museumArrive + state.viewMinutes;
  const cappedByClose = viewEnd > MUSEUM_CLOSE;
  if (cappedByClose) viewEnd = MUSEUM_CLOSE;

  // 决定晚间方案
  let plan = state.eveningPlan;
  if (plan === 'auto') {
    plan = viewEnd < NANTOU_CUTOFF ? 'nantou' : 'guangming';
  }
  const canNantou = viewEnd < NANTOU_CUTOFF; // 太晚去南头古城就赶不上

  let dinnerStart, dinnerEnd, exploreStart, exploreEnd, returnDepart, returnArrive, transitToDinner;

  if (plan === 'nantou') {
    transitToDinner = NANTOU_TAXI;
    dinnerStart = viewEnd + NANTOU_TAXI; // 看展结束 + 打车50分钟即开饭
    dinnerEnd = dinnerStart + 90;
    exploreStart = dinnerEnd;
    exploreEnd = exploreStart + 90;  // 古城游览约1.5h
    returnDepart = exploreEnd;
    returnArrive = returnDepart + RETURN_MIN.nantou[state.border];
  } else {
    transitToDinner = 7;
    dinnerStart = viewEnd + 7; // 看展结束 + 打车7分钟即开饭
    dinnerEnd = dinnerStart + 90;
    exploreStart = null;
    exploreEnd = null;
    returnDepart = dinnerEnd;
    returnArrive = returnDepart + RETURN_MIN.guangming[state.border];
  }

  document.getElementById('sumLunch').textContent = formatTime(lunchStart);
  document.getElementById('sumMuseum').textContent = formatTime(museumArrive);
  document.getElementById('sumViewEnd').textContent = formatTime(viewEnd);
  document.getElementById('sumDinner').textContent = formatTime(dinnerStart);
  document.getElementById('sumReturn').textContent = formatTime(returnArrive);

  const hrs = Math.floor(state.viewMinutes / 60);
  const mins = state.viewMinutes % 60;
  const viewLabel = `${hrs}小时${mins ? mins + '分' : ''}`;

  const tl = document.getElementById('timeline');
  tl.innerHTML = `
    ${tlItem(formatTime(hkDepart), '港方集合', '九龙塘地铁站', '集合出发前往福田口岸')}
    ${tlItem(formatTime(bordercross), '深圳入境', '福田口岸', '过关后出发前往午饭地点')}

    ${tlItemOpen(formatTime(lunchStart), '午饭', '选择餐厅', 'highlighted')}
      <div class="choice-group">
        <div class="choice-label">选择餐厅</div>
        <div class="choice-options">
          ${LUNCH_OPTIONS.map(o => `
            <button class="choice-btn ${o.id === state.lunch ? 'selected' : ''}" onclick="selectLunch('${o.id}')">
              <div class="radio"></div>
              <div style="flex:1">
                <div class="choice-main">${o.name}</div>
                <div class="choice-meta">${o.sub}</div>
                <div class="choice-meta">${o.transit_metro} · ${o.transit_taxi}</div>
              </div>
              <div class="choice-transit">→美术馆<br>打车${o.museum_taxi}分</div>
            </button>
          `).join('')}
        </div>
      </div>
    ${tlItemClose('约110分钟', formatTime(lunchEnd), '可点奶茶提神（去茶山推荐）')}

    ${museumBlock(formatTime(museumArrive), formatTime(viewEnd), viewLabel, cappedByClose)}

    ${eveningBlock(plan, canNantou, formatTime(dinnerStart), formatTime(dinnerEnd), exploreStart, exploreEnd, transitToDinner)}

    ${tlItemOpen(formatTime(returnDepart), '返回过关', '选择口岸', 'normal')}
      <div class="choice-group">
        <div class="choice-options">
          ${BORDER_OPTIONS.map(o => `
            <button class="choice-btn ${o.id === state.border ? 'selected' : ''}" onclick="selectBorder('${o.id}')">
              <div class="radio"></div>
              <div>
                <div class="choice-main">${o.name}</div>
                <div class="choice-meta">打车约${RETURN_MIN[plan][o.id]}分钟（${plan === 'nantou' ? '南头古城出发' : '光明出发'}）</div>
              </div>
            </button>
          `).join('')}
        </div>
      </div>
    ${returnArrivalCard(formatTime(returnArrive), borderOpt.name)}
  `;
}

function museumBlock(arriveT, endT, viewLabel, capped) {
  const capNote = capped
    ? `<div class="view-end-note" style="color:#E8B4A0">已到闭馆时间，看展结束封顶 18:00</div>`
    : `<div class="view-end-note" style="color:rgba(255,255,255,0.5)">看展结束约 <b style="color:var(--gold)">${endT}</b></div>`;
  return `
    <div class="tl-item">
      <div class="tl-time">${arriveT}</div>
      <div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="museum-card">
        <div class="museum-en">SIMoA · 光明大道16号</div>
        <div class="museum-name">深圳国际美术馆</div>
        <div class="ticket-note">🎟 全天通票（咸鱼 ¥94）· 含以下全部展览</div>
        <div class="museum-exhibits">
          ${exhibitRow('新链：艺术的未来', '特展', '至 2027.4.30')}
          ${exhibitRow('徐冰：字在乐园', '特展', '至 2027.4.30')}
          ${exhibitRow('国宝归来', '特展', '至 2026.7.20')}
          ${exhibitRow('闪烁的1/∞', '普展', '至 2027.4.30')}
          ${exhibitRow('缣素绵延', '普展', '至 2026.7.29')}
          ${exhibitRow('东方根脉与当代转化', '普展', '至 2026.11.20')}
          ${exhibitRow('大师之境', '普展', '至 2026.8.31')}
        </div>
        <div class="view-control">
          <div class="view-control-head">
            <span class="view-control-label">看展时长（拖动调整）</span>
            <span class="view-control-value">${viewLabel}</span>
          </div>
          <input type="range" min="60" max="420" step="30" value="${state.viewMinutes}" oninput="setViewMinutes(this.value)">
          ${capNote}
        </div>
        <div style="margin-top:8px;font-size:11px;color:rgba(255,255,255,0.35);">开放 10:00–18:00 · 17:00停止入场 · 周一闭馆</div>
      </div>
    </div>
  `;
}

function exhibitRow(name, type, dates) {
  return `<div class="exhibit-row"><div class="exhibit-name">${name}</div><div class="exhibit-type">${type}</div><div class="exhibit-dates">${dates}</div></div>`;
}

function eveningBlock(plan, canNantou, dinnerStartT, dinnerEndT, exploreStart, exploreEnd, transit) {
  const autoActive = state.eveningPlan === 'auto';
  const hint = canNantou
    ? `看展早于 <b>17:00</b> 结束，可打车前往 <b>南头古城</b>（约50分钟）吃饭逛街`
    : `看展较晚结束，推荐就近 <b>光明乳鸽</b>（打车约7分钟）`;

  let body = '';
  if (plan === 'guangming') {
    body = `
      <div class="choice-group">
        <div class="choice-label">乳鸽餐厅（距美术馆约7分钟车程）</div>
        <div class="choice-options">
          ${GUANGMING_DINNER.map(o => `
            <button class="choice-btn ${o.id === state.dinnerGuangming ? 'selected' : ''}" onclick="selectDinnerGM('${o.id}')">
              <div class="radio"></div>
              <div><div class="choice-main">${o.name}</div><div class="choice-meta">${o.sub}</div></div>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    body = `
      <div class="choice-group">
        <div class="choice-label">南头古城餐厅（美术馆打车约50分钟）</div>
        <div class="choice-options">
          ${NANTOU_DINNER.map(o => `
            <button class="choice-btn ${o.id === state.dinnerNantou ? 'selected' : ''}" onclick="selectDinnerNT('${o.id}')">
              <div class="radio"></div>
              <div><div class="choice-main">${o.name}</div><div class="choice-meta">${o.sub}</div></div>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="extras">
        <div class="extras-section">
          <div class="extras-title">小吃</div>
          <div class="tag-row">${NANTOU_SNACKS.map(s => `<span class="tag snack">${s}</span>`).join('')}</div>
        </div>
        <div class="extras-section">
          <div class="extras-title">小店 · 游览古城</div>
          <div class="tag-row">${NANTOU_SHOPS.map(s => `<span class="tag shop">${s}</span>`).join('')}</div>
        </div>
      </div>
    `;
  }

  const planClass = plan === 'nantou' ? 'nantou' : 'guangming';
  const exploreCard = (plan === 'nantou' && exploreStart !== null) ? `
    <div class="tl-item">
      <div class="tl-time">${formatTime(exploreStart)}</div>
      <div class="tl-spine"><div class="tl-dot" style="background:var(--blue)"></div><div class="tl-line"></div></div>
      <div class="tl-card">
        <div class="tl-card-label">饭后游览</div>
        <div class="tl-card-title">南头古城</div>
        <div class="tl-card-sub">逛小店、买文创、酒馆小酌</div>
        <div class="tl-card-duration"><span class="duration-pill">约90分钟</span> 至 ${formatTime(exploreEnd)}</div>
      </div>
    </div>
  ` : '';

  return `
    <div class="tl-item">
      <div class="tl-time">${dinnerStartT}</div>
      <div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="tl-card ${plan === 'guangming' ? 'highlighted' : ''}" style="${plan === 'nantou' ? 'border-color:#A8C2DB;background:#F4F8FB' : ''}">
        <div class="tl-card-label">晚饭</div>
        <div class="plan-toggle">
          <div class="plan-toggle-btn ${state.eveningPlan === 'guangming' || (autoActive && plan==='guangming') ? 'active' : ''}" onclick="selectPlan('guangming')">
            <div class="plan-toggle-title">光明乳鸽</div>
            <div class="plan-toggle-sub">就近 · 打车7分</div>
          </div>
          <div class="plan-toggle-btn ${state.eveningPlan === 'nantou' || (autoActive && plan==='nantou') ? 'active' : ''}" onclick="selectPlan('nantou')">
            <div class="plan-toggle-title">南头古城</div>
            <div class="plan-toggle-sub">逛吃 · 打车50分</div>
          </div>
        </div>
        <div class="auto-hint">${autoActive ? '🔄 已按看展结束时间自动推荐：' : '已手动选择。'}${hint}</div>
        ${body}
        <div class="tl-card-duration"><span class="duration-pill">约90分钟</span> 结束约 ${dinnerEndT}</div>
      </div>
    </div>
    ${exploreCard}
  `;
}

function tlItem(time, label, title, sub) {
  return `
    <div class="tl-item">
      <div class="tl-time">${time}</div>
      <div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="tl-card">
        <div class="tl-card-label">${label}</div>
        <div class="tl-card-title">${title}</div>
        <div class="tl-card-sub">${sub}</div>
      </div>
    </div>
  `;
}

function tlItemOpen(time, label, title, cardClass) {
  return `
    <div class="tl-item">
      <div class="tl-time">${time}</div>
      <div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="tl-card ${cardClass}">
        <div class="tl-card-label">${label}</div>
        <div class="tl-card-title">${title}</div>
  `;
}

function tlItemClose(duration, endTime, note) {
  const noteHtml = note ? `<div class="tl-card-sub" style="margin-top:6px">🧋 ${note}</div>` : '';
  return `
        <div class="tl-card-duration"><span class="duration-pill">${duration}</span> 结束约 ${endTime}</div>
        ${noteHtml}
      </div>
    </div>
  `;
}

function returnArrivalCard(arriveTime, borderName) {
  return `
        <div class="tl-card-duration"></div>
      </div>
    </div>
    <div class="tl-item">
      <div class="tl-time">${arriveTime}</div>
      <div class="tl-spine"><div class="tl-dot" style="background:#2E7D52"></div></div>
      <div class="crossing-card">
        <div class="crossing-title">✓ 抵达 ${borderName}</div>
        <div class="crossing-sub">行程结束，安全回港</div>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
